# Standard Library Math Bindings
# Provides mathematical operations and functions

[meta]
name = "math"
version = "1.0.0"

[[functions]]
name = "sqrt"
location = "std::f64::sqrt"
target = "native"
description = "Compute square root of a float"

[functions.input]
value = "Float"

[functions.output.success]
result = "Float"

[functions.output.error]
type = "MathError"
code = "Int"
message = "String"


