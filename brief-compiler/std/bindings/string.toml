# Standard Library String Bindings
# Provides string manipulation and conversion functions

[meta]
name = "string"
version = "1.0.0"

[[functions]]
name = "string_length"
location = "std::string::String::len"
target = "native"
description = "Get length of string in bytes"

[functions.input]
text = "String"

[functions.output.success]
length = "Int"

[functions.output.error]
type = "StringError"
code = "Int"
message = "String"


