# Collections Bindings
# Provides collection operations that require foreign implementation

# ==================================================
# __filter - Native implementation
# ==================================================
[[functions]]
name = "__filter"
location = "brief_ffi_native::__filter"
target = "native"
mapper = "rust"
description = "Filter list elements by predicate"

[functions.input]
list = "List<T>"
pred = "T -> Bool"

[functions.output.success]
result = "List<T>"

[functions.output.error]
type = "CollectionsError"
code = "Int"
message = "String"


# ==================================================
# __filter - WASM implementation
# ==================================================
[[functions]]
name = "__filter"
location = "__filter"
target = "wasm"
mapper = "wasm"
description = "Filter list elements by predicate (WASM)"

[functions.input]
list = "List<T>"
pred = "T -> Bool"

[functions.output.success]
result = "List<T>"

[functions.output.error]
type = "CollectionsError"
code = "Int"
message = "String"


