# Standard I/O Bindings
# Provides console input/output operations

[[functions]]
name = "__print"
location = "brief_ffi_native::__print"
target = "native"
description = "Print string to stdout without newline"

[functions.input]
msg = "String"

[functions.output.success]
result = "Bool"

[functions.output.error]
type = "IoError"
code = "Int"
message = "String"



# ==================================================
# __print - WASM implementation
# ==================================================
[[functions]]
name = "__print"
location = "__print"
target = "wasm"
mapper = "wasm"
description = "Print string to stdout without newline (WASM)"
wasm_impl = """function __print(msg) {
    console.log(msg);
    return true;
}"""

[functions.input]
msg = "String"
[functions.output.success]
result = "Bool"
[functions.output.error]
type = "IoError"
code = "Int"
message = "String"
