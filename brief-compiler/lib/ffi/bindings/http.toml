# HTTP Bindings
# Provides HTTP request/response operations

# ==================================================
# __http_get - Native implementation
# ==================================================
[[functions]]
name = "__http_get"
location = "brief_ffi_native::__http_get"
target = "native"
mapper = "rust"
description = "HTTP GET request (native Rust implementation)"

[functions.input]
url = "String"

[functions.output.success]
result = "String"

[functions.output.error]
type = "HttpError"
code = "Int"
message = "String"


# ==================================================
# __http_get - WASM implementation
# ==================================================
[[functions]]
name = "__http_get"
location = "__http_get"
target = "wasm"
mapper = "wasm"
description = "HTTP GET request (WASM - synchronous XMLHttpRequest)"
wasm_impl = """
function __http_get(url) {
    try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', url, false);
        xhr.send();
        if (xhr.status >= 200 && xhr.status < 300) {
            return xhr.responseText;
        }
        return '';
    } catch(e) {
        console.error('HTTP GET error:', e.message);
        return '';
    }
}"""

[functions.input]
url = "String"

[functions.output.success]
result = "String"

[functions.output.error]
type = "HttpError"
code = "Int"
message = "String"


