# Standard String Bindings
# Provides string manipulation operations

[[functions]]
name = "__to_lower"
location = "brief_ffi_native::__to_lower"
target = "native"
mapper = "rust"
description = "Convert to lowercase"

[functions.input]
s = "String"

[functions.output.success]
result = "String"

[functions.output.error]
type = "StringError"
code = "Int"
message = "String"



# ==================================================
# __to_lower - WASM implementation
# ==================================================
[[functions]]
name = "__to_lower"
location = "__to_lower"
target = "wasm"
mapper = "wasm"
description = "Convert to lowercase (WASM)"
wasm_impl = """function __to_lower(s) {
    return s.toLowerCase();
}"""

[functions.input]
s = "String"
[functions.output.success]
result = "String"
[functions.output.error]
type = "StringError"
code = "Int"
message = "String"
