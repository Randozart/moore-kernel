# ==================================================
# __parse - WASM implementation
# ==================================================
[[functions]]
name = "__parse"
location = "__parse"
target = "wasm"
mapper = "wasm"
description = "Parse JSON string (WASM)"
wasm_impl = """function __parse(s) {
    try {
        return JSON.parse(s);
    } catch(e) {
        console.error('JSON parse error:', e.message);
        return null;
    }
}"""

