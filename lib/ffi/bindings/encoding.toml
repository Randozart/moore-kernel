# ==================================================
# __base64_encode - WASM implementation
# ==================================================
[[functions]]
name = "__base64_encode"
location = "__base64_encode"
target = "wasm"
mapper = "wasm"
description = "Encode to base64 (WASM)"
wasm_impl = """function __base64_encode(s) {
    return btoa(unescape(encodeURIComponent(s)));
}"""

