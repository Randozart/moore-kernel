# ==================================================
# __base64_decode - WASM implementation
# ==================================================
[[functions]]
name = "__base64_decode"
location = "__base64_decode"
target = "wasm"
mapper = "wasm"
description = "Decode from base64 (WASM)"
wasm_impl = """function __base64_decode(s) {
    try {
        return decodeURIComponent(escape(atob(s)));
    } catch(e) {
        return '';
    }
}"""

[functions.input]
s = "String"
[functions.output.success]
result = "String"
[functions.output.error]
type = "EncodingError"
code = "Int"
message = "String"
