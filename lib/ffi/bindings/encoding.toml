# ==================================================
# __md5 - WASM implementation
# ==================================================
[[functions]]
name = "__md5"
location = "__md5"
target = "wasm"
mapper = "wasm"
description = "MD5 hash (WASM)"
wasm_impl = """function __md5(s) {
    // Simple hash - in real use, include a crypto library
    return Array.from(s).reduce((a, c) => ((a << 5) - a + c.charCodeAt(0)) | 0, 0).toString();
}"""

[functions.input]
s = "String"
[functions.output.success]
result = "String"
[functions.output.error]
type = "EncodingError"
code = "Int"
